name: GitHub Pages

on:
  push:
    branches: [ "main" ]
    paths:
      - 'src/PKHeX.Web/**'
      - 'src/PKHeX.Facade/**'
      - 'external/PKHeX/**'
      - '.github/workflows/github-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Update submodules to the latest commit
        run: git submodule update --remote --recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build JS
        run: |
          cd src/PKHeX.Web/_js
          echo "VITE_FIREBASE_ENABLED=false" >> .env
          npm ci
          npm run build

      - name: Build Blog
        run: |
          cd src/PKHeX.Web/_blog
          npm ci
          npm run build

      - name: Publish
        run: dotnet publish ./src/PKHeX.Web/PKHeX.Web.csproj -c Release -o ./publish

      - name: Fix base href for GitHub Pages
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          PUBLISH_DIR="./publish/wwwroot"
          PATH_BASE="/$REPO_NAME"

          # Fix base href
          sed -i "s|<base href=\"/\"/>|<base href=\"$PATH_BASE/\"/>|" "$PUBLISH_DIR/index.html"

          # Fix 404 redirect
          sed -i "s|location.replace('/');|location.replace('$PATH_BASE/');|" "$PUBLISH_DIR/404.html"

          # Inject pathbase interceptor before Blazor loads so NavigateTo("/route")
          # resolves to /REPO_NAME/route instead of /route
          INTERCEPTOR=$(cat <<'SCRIPT'
          <script>(function(){var p=location.pathname.replace(/[^/]*$/,'');if(p==='/')return;var op=history.pushState.bind(history);var or=history.replaceState.bind(history);function f(u){if(!u)return u;try{var o=new URL(u,location.origin)}catch(e){return u}if(o.origin!==location.origin)return u;if(o.pathname===p||o.pathname.startsWith(p))return u;o.pathname=p.replace(/\/$/,'')+o.pathname;return o.pathname+o.search+o.hash}history.pushState=function(s,t,u){return op(s,t,f(u))};history.replaceState=function(s,t,u){return or(s,t,f(u))}})();
          </script>
          SCRIPT
          )
          sed -i "s|</head>|$INTERCEPTOR\n    </head>|" "$PUBLISH_DIR/index.html"

      - name: Add .nojekyll
        run: touch publish/wwwroot/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./publish/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
